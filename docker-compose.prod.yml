# Production overlay — use on Hetzner VPS:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  api:
    # Do not publish API to the internet; only Caddy reaches it.
    ports: !reset []
    expose:
      - "8000"
    environment:
      DEBUG: "false"
      TRUSTED_PROXY_HEADERS: "true"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN in .env e.g. www736.your-server.de}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
