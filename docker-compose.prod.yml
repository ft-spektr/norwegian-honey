# Production overlay — use on Hetzner VPS:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  api:
    # Do not publish API to the internet; only Caddy reaches it.
    ports: !reset []
    expose:
      - "8000"
    environment:
      DEBUG: "false"
      TRUSTED_PROXY_HEADERS: "true"
      DOMAIN: ${DOMAIN:?Set DOMAIN in .env}
      INVESTIGATOR_API_KEY: ${INVESTIGATOR_API_KEY:?Set INVESTIGATOR_API_KEY in .env}

  caddy:
    build:
      context: ./deploy
      dockerfile: Dockerfile.caddy
    image: norwegian-honey-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN in .env e.g. canary.example.com}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
